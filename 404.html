<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Vinesh Reddy Kankanalapally</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #8892a4;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-size: 5rem;
      font-weight: 700;
      color: rgba(100,255,218,0.2);
      letter-spacing: -2px;
      line-height: 1;
    }
    p { font-size: 0.95rem; line-height: 1.7; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 10px 22px;
      font-size: 0.74rem;
      font-weight: 600;
      color: #64ffda;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(100,255,218,0.28);
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    a:hover { background: rgba(100,255,218,0.07); border-color: #64ffda; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Page not found.</p>
  <a href="/">Go home ↗</a>
</body>
</html>
